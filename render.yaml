# Render — API Evo-smartUni (smart-academy-of-congo-api-1)
# IMPORTANT : sans disque /data les comptes créés sont perdus à chaque redémarrage.
services:
  - type: web
    name: smart-academy-of-congo-api-1
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    disk:
      name: sac-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: CROSS_ORIGIN_AUTH
        value: "true"
      - key: DATABASE_PATH
        value: /data/sac.db
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: BACKUP_DIR
        value: /data/backups
      - key: ALLOWED_ORIGINS
        value: https://smart-academy-of-congoat.onrender.com,https://evosmartuni.com,https://www.evosmartuni.com
