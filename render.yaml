# Render Blueprint — Smart Academy API (Python)
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: sac-api-python
    runtime: python
    rootDir: backend-python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: sac-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: COOKIE_SECURE
        value: true
      - key: DATABASE_PATH
        value: /data/sac.db
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SAC_PLATFORM_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://REPLACE-WITH-YOUR-FRONTEND-URL.com
      - key: FRONTEND_URL
        value: https://REPLACE-WITH-YOUR-FRONTEND-URL.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: noreply@smartacademy.cd
